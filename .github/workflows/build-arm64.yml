name: Build ARM64 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.16-arm64)'
        required: true
        default: 'v0.1.16-arm64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          cargo install cross
          cross build --release --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/microclaw release/
          cd release
          tar czf microclaw-aarch64-unknown-linux-gnu.tar.gz microclaw
          sha256sum microclaw-aarch64-unknown-linux-gnu.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: MicroClaw ARM64 ${{ github.event.inputs.version }}
          draft: false
          prerelease: true
          files: |
            release/microclaw-aarch64-unknown-linux-gnu.tar.gz
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}