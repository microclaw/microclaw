name: Build ARM64 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.16-arm64)'
        required: true
        default: 'v0.1.16-arm64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross

      - name: Install ARM64 OpenSSL
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          sudo apt-get update
          sudo apt-get install -y libssl-dev:arm64 pkg-config

      - name: Build ARM64
        run: |
          export OPENSSL_DIR=/usr/aarch64-linux-gnu
          export PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/lib/pkgconfig
          export PKG_CONFIG_ALLOW_CROSS=1
          cross build --release --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/microclaw release/
          cd release
          tar czf microclaw-aarch64-unknown-linux-gnu.tar.gz microclaw
          sha256sum microclaw-aarch64-unknown-linux-gnu.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: MicroClaw ARM64 ${{ github.event.inputs.version }}
          draft: false
          prerelease: true
          files: |
            release/microclaw-aarch64-unknown-linux-gnu.tar.gz
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}