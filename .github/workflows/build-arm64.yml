name: Build ARM64 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.16-arm64)'
        required: true
        default: 'v0.1.16-arm64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Patch Cargo.toml for rustls
        run: |
          # Replace native-tls with rustls
          sed -i 's/tokio-native-tls = "0.3"/tokio-rustls = "0.26"/' Cargo.toml
          sed -i 's/native-tls = "0.2"/rustls = "0.23"/' Cargo.toml
          sed -i 's/reqwest = { version = "0.12", features = \["json", "blocking"\] }/reqwest = { version = "0.12", features = ["json", "blocking", "rustls-tls"] }/' Cargo.toml

      - name: Install cross
        run: cargo install cross

      - name: Build ARM64
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/microclaw release/
          cd release
          tar czf microclaw-aarch64-unknown-linux-gnu.tar.gz microclaw
          sha256sum microclaw-aarch64-unknown-linux-gnu.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: MicroClaw ARM64 ${{ github.event.inputs.version }}
          draft: false
          prerelease: true
          files: |
            release/microclaw-aarch64-unknown-linux-gnu.tar.gz
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}